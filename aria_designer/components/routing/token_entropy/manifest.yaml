id: token_entropy
version: 1.0.0
name: Entropy Score
category: routing
tags:
- functional
- scoring
status: approved
description: Shannon entropy of input scores as a per-token difficulty signal.
inputs:
- name: scores
  dtype: tensor
  shape:
  - B
  - S
  - K
outputs:
- name: routing_signal
  dtype: tensor
  shape:
  - B
  - S
  - 1
params: {}
implementation:
  native: null
  rust: null
  cython: null
  python: kernel_fallback.py
performance:
  has_params: false
  param_formula: "0"
  preserves_gradient: true
  numerically_risky: false
help_md: '### Technical
  Computes per-token Shannon entropy over a set of categorical scores (e.g. from an MoE router or classifier). High entropy indicates uncertainty.

  Inputs: scores:tensor[B, S, K].
  Outputs: routing_signal:tensor[B, S, 1].
  ### Plain Language
  Measures how "uncertain" the model is about a token. Can be used to route uncertain tokens to more powerful compute paths.
  '
