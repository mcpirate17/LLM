id: dual_compression_blend
version: 1.0.0
name: Compression Mixture Experts
category: linear_algebra
tags:
- parameterized
- learnable
- compression
- moe
- exotic
status: approved
description: Routing assigns tokens to method-specific compression experts.
inputs:
- name: x
  dtype: tensor
  shape:
  - B
  - S
  - D
- name: routing_signal
  dtype: tensor
  shape:
  - B
  - S
  - 2
outputs:
- name: y
  dtype: tensor
  shape:
  - B
  - S
  - D
params: {}
implementation:
  native: null
  rust: null
  cython: null
  python: kernel_fallback.py
performance:
  has_params: true
  param_formula: 2 * D * rank
  preserves_gradient: true
  numerically_risky: false
help_md: '### Technical
  A Mixture-of-Experts (MoE) layer where each expert uses a different compression technique (e.g., one low-rank, one bottleneck).

  Inputs: x:tensor[B, S, D], routing_signal:tensor[B, S, 2].
  Outputs: y:tensor[B, S, D].
  ### Plain Language
  A team of specialized "mini-models" that each use a different way to save space, with a router choosing the best one for each token.
  '
