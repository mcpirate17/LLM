id: mixed_recursion_gate
version: 1.0.0
name: Mixed Recursion Gate
category: routing
tags:
- parameterized
- learnable
- recursion
- exotic
status: approved
description: Tokens re-enter block with different transforms per recursion step, depth is conditional on difficulty.
inputs:
- name: x
  dtype: tensor
  shape:
  - B
  - S
  - D
- name: scores
  dtype: tensor
  shape:
  - B
  - S
  - max_depth
outputs:
- name: y
  dtype: tensor
  shape:
  - B
  - S
  - D
params:
  max_depth:
    type: integer
    default: 3
    constraints:
      min: 1
      max: 8
implementation:
  native: null
  rust: null
  cython: null
  python: kernel_fallback.py
performance:
  has_params: true
  param_formula: max_depth * D * D
  preserves_gradient: true
  numerically_risky: false
help_md: '### Technical
  Implements multi-step recursion where easy tokens exit early and hard tokens re-process through distinct learned projections at each step.

  Inputs: x:tensor[B, S, D], scores:tensor[B, S, max_depth].
  Outputs: y:tensor[B, S, D].
  ### Plain Language
  A "thinking" loop that repeats processing for difficult data while letting easy data finish quickly.
  '
