id: lane_router
version: 1.0.0
name: Lane Router
category: routing
tags:
- routing
- adaptive_compute
status: approved
description: Threshold/learned routing — maps difficulty scores to lane assignments and weights
inputs:
- name: x
  dtype: tensor
  shape: [B, S, D]
outputs:
- name: y
  dtype: tensor
  shape: [B, S, D]
params:
  num_lanes:
    type: integer
    default: 3
    description: Number of processing lanes
  routing_mode:
    type: string
    default: threshold
    description: Routing strategy (threshold or learned)
implementation:
  native: null
  rust: null
  cython: null
  python: kernel_fallback.py
performance:
  has_params: false
  param_formula: '0'
  preserves_gradient: true
  numerically_risky: false
help_md: |
  ### Technical
  Routes tokens to processing lanes based on upstream difficulty scores.

  Threshold mode: normalizes scores to [0,1] and uses torch.bucketize to assign
  tokens to N equally-spaced lanes. Creates one-hot weight tensor [B,S,N].

  Inputs: x:tensor[B, S, D].
  Outputs: y:tensor[B, S, D].
  Params: num_lanes (integer), routing_mode (string).

  ### Plain Language
  Decides which processing lane each token should go to based on its difficulty score.
