help_md: '### Technical

  Two parallel softmax attention maps are computed from split Q/K groups
  and subtracted. Common-mode noise cancels, amplifying relevant signal.
  A learned lambda parameter controls subtraction strength.

  Based on: Differential Transformer (Microsoft, ICLR 2025).

  Inputs: x:tensor[B, S, D].
  Outputs: y:tensor[B, S, D].

  ### Plain Language

  Standard attention wastes capacity on irrelevant tokens. Differential
  attention computes attention twice and subtracts, like noise-cancelling
  headphones for attention weights. The result is sharper, more focused
  attention patterns.
  '
