id: token_hodge_mixer
version: 1.0.0
name: Token Hodge Mixer
category: mixing
tags: [topology, incidence, discovery]
status: experimental
description: Causal edge and triangle incidence messages over adjacent token simplices.
inputs:
- name: x
  dtype: tensor
  shape: [B, S, D]
outputs:
- name: y
  dtype: tensor
  shape: [B, S, D]
params: {}
implementation:
  native: null
  rust: null
  cython: null
  python: kernel_fallback.py
performance:
  has_params: true
  param_formula: "D*D*4"
