help_md: '### Technical

  Combines gating (Mamba2) with the delta rule (DeltaNet) for targeted
  state memory modification. Two gates control behavior:
  - alpha (decay): how fast state memory erases
  - beta (update): how strongly new input modifies state

  The delta term (v*k - h) does targeted overwrites instead of blind accumulation.

  Based on: Gated Delta Networks (NVIDIA, ICLR 2025). Used in Qwen3-Next.

  Inputs: x:tensor[B, S, D].
  Outputs: y:tensor[B, S, D].

  ### Plain Language

  A fast alternative to attention that remembers selectively. Instead of
  piling up all past information, it can surgically replace outdated memories
  with new ones. Two learned gates control forgetting and writing.
  '
