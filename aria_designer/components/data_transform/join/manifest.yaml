id: join
version: 1.0.0
name: Join
category: data_transform
tags:
  - data
  - transform
  - join
status: approved
description: Joins two row-like tensors with inner/left/outer/concat-key semantics using configurable key columns.
inputs:
  - name: left
    dtype: tensor
    shape: ["*"]
  - name: right
    dtype: tensor
    shape: ["*"]
outputs:
  - name: joined
    dtype: tensor
    shape: ["*"]
params:
  join_mode:
    type: enum
    options: [inner, left, outer, concat_key]
    default: inner
    description: Join behavior. `concat_key` concatenates rows grouped by key with zero-fill for missing side.
  left_key_index:
    type: integer
    default: 0
    constraints:
      min: 0
      max: 65535
    description: Key column index for left input.
  right_key_index:
    type: integer
    default: 0
    constraints:
      min: 0
      max: 65535
    description: Key column index for right input.
  key_tolerance:
    type: float
    default: 0.0
    constraints:
      min: 0.0
      max: 1000000.0
    description: Numeric key tolerance. 0 means exact match.
  include_key_columns:
    type: boolean
    default: false
    description: Keep key columns from both sides in the joined output.
  missing_fill_value:
    type: float
    default: 0.0
    description: Fill value for unmatched side in left/outer/concat_key modes.
  max_matches_per_key:
    type: integer
    default: 256
    constraints:
      min: 1
      max: 1000000
    description: Safety cap to prevent combinatorial explosion for duplicate keys.
  schema_validation:
    type: enum
    options: [none, strict]
    default: none
    description: Strict mode enforces expected feature dims for left/right inputs.
  expected_left_dim:
    type: integer
    default: -1
    constraints:
      min: -1
      max: 1048576
    description: Expected left feature dimension in strict schema mode (-1 disables check).
  expected_right_dim:
    type: integer
    default: -1
    constraints:
      min: -1
      max: 1048576
    description: Expected right feature dimension in strict schema mode (-1 disables check).
implementation:
  python: kernel_fallback.py
performance:
  has_params: true
help_md: |
  ### Technical
  Performs relational-style joins on row-like tensors.

  Inputs:
  - `left:tensor[*]`
  - `right:tensor[*]`

  Output:
  - `joined:tensor[*]`

  Supported modes:
  - `inner`: matched key rows only
  - `left`: all left rows + matched right rows (fill for missing)
  - `outer`: union of both keys with fill for unmatched side
  - `concat_key`: key-group concatenation with fill for missing side

  Notes:
  - Inputs are normalized to row format `(N, F)` for joining.
  - `key_tolerance` allows approximate numeric key matching.
  - `max_matches_per_key` caps duplicate-key cross-products.

  ### Plain Language
  Use this to combine two datasets/tensors by ID (or another key column), similar to SQL joins.
  Pick `inner` when you only want shared keys, `left` when left is the source of truth, and `outer`
  when you want to keep everything from both sides.
