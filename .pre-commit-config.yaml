repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]           # catches unused imports, dead assignments
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [
          research/, aria_core/, aria_designer/, research/tools/vulture_whitelist.py,
          --min-confidence, "80",
          --exclude, "*/.venv/*,*/node_modules/*,*/__pycache__/*,*/.run/*,*/tests/*,*/migrations/*"
        ]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        exclude: '(^|/)(\.secrets\.baseline$|tasks/audit/|uv\.lock$|package-lock\.json$|research/runtime_events/|research/runtime/|research/reports/)'

  - repo: local
    hooks:
      - id: code-review-graph-detect
        name: Code review graph changed-symbol hint
        language: system
        entry: bash -c 'command -v code-review-graph >/dev/null 2>&1 && code-review-graph detect-changes --brief || true'
        pass_filenames: false
      - id: shellcheck
        name: ShellCheck staged shell scripts
        language: system
        entry: bash -c 'if ! command -v shellcheck >/dev/null 2>&1; then echo "shellcheck not installed; skipping"; exit 0; fi; shellcheck "$@"' --
        types: [shell]
      - id: taplo-format-check
        name: Taplo TOML format check
        language: system
        entry: bash -c 'if ! command -v taplo >/dev/null 2>&1; then echo "taplo not installed; skipping"; exit 0; fi; taplo fmt --check "$@"' --
        types: [toml]
      - id: pyright-python
        name: Pyright staged Python type check
        language: system
        entry: uv run pyright --project pyrightconfig.json --level error
        types_or: [python, pyi]
      - id: xenon-complexity
        name: Xenon staged Python complexity check
        language: system
        entry: uv run xenon --max-average B --max-modules C --max-absolute D --ignore .venv,node_modules,__pycache__,.run,tests,migrations
        types_or: [python, pyi]
      - id: bandit-python
        name: Bandit staged Python security check
        language: system
        entry: uv run bandit -q --severity-level medium --confidence-level medium
        types_or: [python, pyi]
        exclude: '(^|/)(research/tests/|aria_designer/tests/|component_fab/tests/)'
      - id: semgrep-ai-safety
        name: Semgrep staged AI safety/security rules
        language: system
        entry: uv run semgrep scan --config .semgrep.yml --error --quiet
        types_or: [python, javascript, jsx, ts, tsx]
        exclude: '(^|/)(research/tests/|aria_designer/tests/|component_fab/tests/)'
      - id: biome-check
        name: Biome staged JS/TS/JSON/CSS check
        language: system
        entry: npx --no-install biome check --write --files-ignore-unknown=true
        files: '\.(js|jsx|ts|tsx|json|css)$'
        exclude: '(^|/)package-lock\.json$'
      - id: jscpd-staged
        name: JSCPD staged duplicate-code check
        language: system
        entry: npx --no-install jscpd --config .jscpd.json --noTips
        files: '\.(py|js|jsx|ts|tsx|c|cc|cpp|h|hpp|rs|sh)$'
      - id: codespell
        name: Codespell staged spelling check
        language: system
        entry: uv run codespell
        args: [--ignore-words-list, "ans,mor,nd,pres,astroid,unparseable,regraded"]
        exclude: '(^|/)(uv\.lock$|package-lock\.json$|node_modules/|\.venv/|tasks/audit/|research/runtime_events/|research/runtime/|research/reports/)'
      - id: detect-secrets
        name: Detect-secrets staged secret scan
        language: system
        entry: uv run detect-secrets-hook --baseline .secrets.baseline --exclude-files '(^|/)(\.secrets\.baseline$|uv\.lock$|package-lock\.json$|node_modules/|\.venv/|tasks/audit/|research/runtime_events/|research/runtime/|research/reports/)'
      - id: pip-audit
        name: Pip-audit dependency vulnerability check
        language: system
        entry: uv run pip-audit --progress-spinner off
        pass_filenames: false
      - id: protected-data-deletes
        name: Block protected research data deletes
        language: system
        entry: python conductor/check_protected_deletes.py
        pass_filenames: false
      - id: duplicate-function-bodies
        name: Block copied Python function bodies
        language: system
        entry: python conductor/check_duplicate_function_bodies.py
        pass_filenames: false
      - id: guardrail-audit
        name: Guardrail audit (staged files)
        language: system
        entry: python conductor/guardrail_audit.py --staged-only --check
        pass_filenames: false
      - id: forbid-repo-root-junk
        name: Forbid junk files at repo root
        language: system
        entry: python conductor/check_root_junk.py
        pass_filenames: true
      - id: forbid-json-in-notes
        name: research/notes/ is .md-only
        language: system
        entry: python conductor/check_json_in_notes.py
        pass_filenames: true
        files: ^research/notes/.*
