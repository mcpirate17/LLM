repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]           # catches unused imports, dead assignments
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [
          research/, aria_core/, aria_designer/, vulture_whitelist.py,
          --min-confidence, "80",
          --exclude, "*/.venv/*,*/node_modules/*,*/__pycache__/*,*/.run/*,*/tests/*,*/migrations/*"
        ]

  - repo: local
    hooks:
      - id: no-file-over-3000
        name: Reject god files (>3000 lines)
        language: python
        entry: python -c "import subprocess,sys;r=subprocess.run(['git','ls-files','*.py'],capture_output=True,text=True);files=[f for f in r.stdout.strip().split('\n') if f and '/tests/' not in f and '/archive/' not in f];bad=[f for f in files if sum(1 for _ in open(f)) > 3000];[print(f) for f in bad];sys.exit(1 if bad else 0)"
        pass_filenames: false
