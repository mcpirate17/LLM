repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]           # catches unused imports, dead assignments
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [
          research/, aria_core/, aria_designer/, research/tools/vulture_whitelist.py,
          --min-confidence, "80",
          --exclude, "*/.venv/*,*/node_modules/*,*/__pycache__/*,*/.run/*,*/tests/*,*/migrations/*"
        ]

  - repo: local
    hooks:
      - id: guardrail-audit
        name: Guardrail audit (staged files)
        language: system
        entry: python conductor/guardrail_audit.py --staged-only --check
        pass_filenames: false
      - id: no-file-over-1250
        name: Reject god files (>1250 lines)
        language: python
        entry: python -c "import subprocess,sys;r=subprocess.run(['git','diff','--cached','--name-only','--diff-filter=ACMR'],capture_output=True,text=True);files=[f for f in r.stdout.strip().split('\n') if f and f.endswith(('.py','.js','.jsx','.ts','.tsx','.c','.cc','.cpp','.cu','.h','.hpp')) and '/tests/' not in f and '/archive/' not in f and '/node_modules/' not in f];bad=[f'{f}:{sum(1 for _ in open(f, encoding=\"utf-8\", errors=\"ignore\"))}' for f in files if sum(1 for _ in open(f, encoding=\"utf-8\", errors=\"ignore\")) > 1250];[print(x) for x in bad];sys.exit(1 if bad else 0)"
        pass_filenames: false
