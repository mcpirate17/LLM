repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]           # catches unused imports, dead assignments
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [
          research/, aria_core/, aria_designer/, research/tools/vulture_whitelist.py,
          --min-confidence, "80",
          --exclude, "*/.venv/*,*/node_modules/*,*/__pycache__/*,*/.run/*,*/tests/*,*/migrations/*"
        ]

  - repo: local
    hooks:
      - id: protected-data-deletes
        name: Block protected research data deletes
        language: system
        entry: python conductor/check_protected_deletes.py
        pass_filenames: false
      - id: duplicate-function-bodies
        name: Block copied Python function bodies
        language: system
        entry: python conductor/check_duplicate_function_bodies.py
        pass_filenames: false
      - id: guardrail-audit
        name: Guardrail audit (staged files)
        language: system
        entry: python conductor/guardrail_audit.py --staged-only --check
        pass_filenames: false
