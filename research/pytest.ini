[pytest]
# Require markers — running bare `pytest tests/` is not allowed.
# Use: pytest -m unit, pytest -m native, pytest -m api, etc.
# Or combine: pytest -m "unit or api"
addopts = --strict-markers
markers =
    unit: Fast unit tests (no native libs, no Flask, no GPU)
    native: Tests requiring native C/Rust/Cython libraries
    api: Flask API integration tests
    pipeline: Runner/pipeline integration tests
    e2e: End-to-end tests (slow, full pipeline)
    designer: aria_designer integration tests
    slow: Tests that take >10s individually
