# Active leaderboard scoring formula — single flattened config (2026-05-05).
#
# Single source of truth for weights / anchors / breakthrough gates. Loaded
# by ``research/scientist/leaderboard_scoring.py`` at module import. A SHA-256
# digest of the file (truncated to 12 hex chars) is stamped on every rescored
# leaderboard row as ``scoring_config_hash``.
#
# Flattening: all v10/v11/v14 weight overrides have been folded into ``base``.
# The empty ``v11_overrides`` and ``v14_overrides`` sections are kept so the
# loader's three-layer composition still works (v10 == v11 == v14 dict-wise).
# The compute_composite_v11/v12/v14 functions in code retain their *behavioral*
# layers — breakthrough boost, tokenizer penalty, controlled-language ladder,
# trust ceiling — those aren't config-only knobs. Their internal weight
# multipliers (``_V11_CAP_INDUCTION_MULTIPLIER`` etc) all evaluate to 1.0 now.
#
# To tune a knob: edit ``base``. That is the only section you should touch.

base:  # Single active config (flattened from v10 + v11 + v14)
  # ── Frontier reference values ──────────────────────────────
  param_eff: 1.09
  learn_eff: 1.13
  long_ctx: 0.375
  avg_params: 28561920
  convergence: 1.30
  binding: 0.15

  # ── Loss tier (~175pts total) ──────────────────────────────
  w_perf_short: 35.0
  w_perf_medium: 50.0
  w_perf_long: 65.0
  w_param_eff: 30.0
  w_learn_eff: 15.0
  w_binding: 0.0  # Capability tier handles ar/ind/binding individually

  # ── Understanding tier ─────────────────────────────────────
  w_blimp: 10.0          # champion hard probe floor; low-step nano runs remain noisy
  w_tinystories: 30.0
  w_cross_task: 30.0
  w_diagnostic: 40.0
  w_hellaswag: 10.0      # champion hard probe floor; insufficient signal at nano scale
  w_hierarchy: 25.0

  # ── Controlled-language ladder (per-tier nano-binding) ─────
  # Progressive credit s05 → s10 → inv. nb_bucket axis = 55pt total
  # (2026-05-05 rebalance to match induction+binding's 90pt baseline).
  w_cl_s05_sa: 3.0
  w_cl_s05_order: 2.0
  w_cl_s05_nb_bucket: 5.0       # 2026-05-05: was missing; gives early-tier nb credit
  w_cl_s10_sa: 9.0
  w_cl_s10_order: 6.0
  w_cl_s10_nb_bucket: 25.0      # 2026-05-05: 20 → 25
  w_cl_inv_sa: 15.0
  w_cl_inv_order: 10.0
  w_cl_inv_nb_bucket: 25.0      # 2026-05-05: 20 → 25
  cl_s05_sa_anchor: 1.000
  cl_s05_order_anchor: 0.605
  cl_s10_sa_anchor: 1.000
  cl_s10_order_anchor: 0.456
  cl_inv_sa_anchor: 0.940
  cl_inv_order_anchor: 0.420

  # ── Capability tier ────────────────────────────────────────
  # Total 290pt: 90 (cap_ar/nano_ar_inv) + 10 full AR + 45 (cap_induction)
  # + 45 (cap_binding) + 25 × 4 (ERF density/decay, id_collapse, logit_margin).
  # 2026-05-05: cap_ar bumped 25→90 — nano_ar_inv replaces dead ar_auc and is
  # now the most trusted binding discriminator. cap_induction/cap_binding
  # cut from 65 to 45 to reduce attention-class dominance.
  w_cap_ar: 90.0
  w_legacy_ar: 10.0      # full AR probe only; separate from nano_ar_inv cap_ar
  w_cap_induction: 45.0
  w_cap_binding: 45.0
  w_cap_erf_density: 25.0
  w_cap_id_collapse: 25.0
  w_cap_erf_decay: 25.0
  w_cap_logit_margin: 25.0

  # ── Aux trajectory tier ────────────────────────────────────
  w_aux_erf_variance: 10.0
  w_aux_icld: 10.0

  # ── Anchors (cohort medians, recalibrated 2026-04-26 / 2026-05-05) ──
  ppl_1000: 744.0       # screening wikitext_perplexity (n=1871)
  ppl_2500: 823.0       # investigation wikitext_perplexity (n=159)
  ppl_10000: 754.0      # val+bt wikitext_perplexity (n=2453)
  blimp: 0.525          # val+bt blimp_overall_accuracy (n=2452)
  hellaswag: 0.225      # val+bt hellaswag_acc (n=2453)
  tinystories: 0.542    # val+bt tinystories_score (n=2452)
  cross_task: 0.279     # val+bt cross_task_score (n=2441)
  diagnostic: 0.004     # val+bt diagnostic_score (n=2447)
  hierarchy: 0.848      # val+bt fp_hierarchy_fitness (n=2283)
  cap_ar_anchor: 0.50           # 2026-05-05: re-anchored for nano_ar_inv [0,1] range
  legacy_ar_anchor: 0.15        # full AR pass signal after longer champion training
  cap_induction_anchor: 0.006   # original V10 anchor — paired with weight 45 produces
  cap_binding_anchor: 0.004     # the same s-curve credit V11's multiplier gave (1.8x ✕ V10)
  cap_erf_density_anchor: 0.047
  cap_id_collapse_anchor: 0.010
  cap_erf_decay_anchor: 0.050
  cap_logit_margin_anchor: 0.003
  aux_erf_variance_anchor: 14280.0
  aux_icld_anchor: 0.017

  # ── Multiplicative gates retired (kept at neutral values) ──
  binding_all_below_penalty: 1.0
  binding_composite_boost: 1.0
  binding_composite_boost_floor: 0.0

  # ── Score-stability (CV) penalty — applied at validation/breakthrough ──
  cv_lambda_loss: 0.5
  cv_lambda_und: 0.3
  cv_lambda_cap: 0.4
  cv_penalty_floor: 0.6

# Override layers — empty after the 2026-05-05 flatten. Loader still reads
# these and merges (base ← v11 ← v14), so empty dicts produce v10 == v11 == v14.
# Behavioral logic (breakthrough boost, tokenizer penalty, controlled-lang
# ladder, trust ceiling) stays in compute_composite_v11/v12/v14 in code.
v11_overrides: {}
v14_overrides: {}

trust_ceiling:  # Champion-range eligibility gates (v11 mechanism)
  ceiling: 360.0
  ppl_floor: 150.0
  hellaswag_floor: 0.25
  blimp_floor: 0.55
  induction_floor: 0.05
  binding_floor: 0.20

breakthrough_gates:  # Tier-promotion floors (block d904-class false positives)
  # Composite floor for the trajectory-aware fallback promotion. 450 sits
  # above all current non-real-architecture composites and below the real
  # reference architecture breakthrough.
  composite_floor: 450.0
  # Min capability signal across {induction_auc, binding_composite,
  # induction_v2_investigation_auc, binding_v2_investigation_auc}.
  capability_floor: 0.10
