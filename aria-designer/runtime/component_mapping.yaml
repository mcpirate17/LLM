# Optional semantic notes for aliases that are intentionally approximate
# (not strict equivalence), surfaced in execution-capability + compile/eval warnings.
approximate_alias_notes:
  state_space: "Mapped to selective_scan; exact state-space formulation may differ."
  low_rank: "Mapped to low_rank_proj; uses rank=D/4 factorization."
  shared_basis: "Mapped to shared_basis_proj; uses 8 shared basis vectors."
  implicit_fixed_point: "Mapped to fixed_point_iter; solver semantics are approximate."
  kan_spline: "Mapped to basis_expansion; spline basis/gating semantics are approximate."
  polynomial_expansion: "Mapped to basis_expansion; polynomial order semantics are approximate."
  product_key_memory: "Mapped to moe_topk; key-value memory retrieval semantics are approximate."
  hash_trick: "Mapped to basis_expansion; hashing collision behavior is not preserved."
  hypernetwork: "Mapped to linear_proj; generated-weights semantics are approximate."
  kronecker: "Mapped to outer_product; exact Kronecker structure is approximate."
  polynomial: "Mapped to basis_expansion; exact polynomial operator semantics are approximate."
  dynamic_norm: "Mapped to norm_last; dynamic adaptation semantics are approximate."
  group_norm: "Mapped to rmsnorm; group partition semantics are approximate."
  sigmoid_norm: "Mapped to norm_last; sigmoid-weighted normalization semantics are approximate."
  alibi: "Mapped to learnable_bias; ALiBi positional bias semantics are approximate."
  convolutional: "Mapped to conv1d_seq; exact positional encoding semantics are approximate."
  learned_absolute: "Mapped to learnable_bias; learned absolute position table semantics are approximate."
  random_fourier: "Mapped to fourier_mixing; random feature sampling semantics are approximate."
  rope: "Mapped to fourier_mixing; rotational embedding semantics are approximate."
  binary_hash: "Mapped to sign_ste; binary hashing semantics are approximate."
  complex_valued: "Mapped to fourier_mixing; complex arithmetic semantics are approximate."
  mixture_embedding: "Mapped to moe_topk; embedding mixture semantics are approximate."
  multi_resolution: "Mapped to basis_expansion; multi-scale semantics are approximate."
  quaternion: "Mapped to multi_head_mix; quaternion algebra semantics are approximate."
  residual_quantized: "Mapped to sign_ste; quantization + residual codebook semantics are approximate."
  sparse_topk: "Mapped to topk_gate; sparse embedding semantics are approximate."
  join: "Mapped to concat in bridge mode; key-based relational join semantics are approximate."

# Execution class controls expected lowering path for components that are not
# directly mapped to PRIMITIVE_REGISTRY.
category_execution_class:
  blocks: composite
  channel_mixing: primitive_candidate
  data_io: data_control
  data_transform: data_control
  control_flow: control
  mixing: primitive_candidate
  routing: control
  representation: primitive_candidate
  positional: primitive_candidate
  normalization: primitive_candidate
  linear_algebra: primitive_candidate
  io: data_control

# Optional per-component execution-class override.
component_execution_class: {}

# Components that should lower as passthrough (identity wire-through) in the
# research bridge until dedicated lowering is implemented.
passthrough_components:
  - sequential
  - loop
  - uniform
  - layerdrop
  - early_exit
  - token_merging
  - cascade
  - adaptive_recursion
  - speculative
  - dense_float
  - none
  - identity_skip
  - no_norm
  - dataset_map
  - dataset_filter
  - filter
  - split_train_val_test
  - file_writer

# Components that lower to graph inputs during research-bridge conversion.
source_components:
  - random_data_source
  - synthetic_data_source
  - file_loader
  - binary_file_reader
  - hf_dataset_loader
  - csv_reader

# Components lowered to explicit primitive templates in bridge conversion.
template_lowered_components:
  - u_net
  - hourglass
  - dense_net
  - fractal
  - parallel_streams
  - feedback_loop
  - mixture_of_paths
