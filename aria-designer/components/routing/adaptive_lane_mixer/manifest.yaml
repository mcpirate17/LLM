help_md: '### Technical
  Routes tokens between "fast" (skip), "medium" (low-rank), and "hard" (full MLP) paths based on a learned difficulty gate.

  Inputs: x:tensor[B, S, D].
  Outputs: y:tensor[B, S, D].
  ### Plain Language
  Smart routing that gives easy tokens a fast pass and saves heavy compute for difficult tokens.
  '
