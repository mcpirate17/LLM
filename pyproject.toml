[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-workspace"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lightgbm>=4.6.0",
    "pyyaml>=6.0",
    "xxhash>=3.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["research", "aria_designer"]
