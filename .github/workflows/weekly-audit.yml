name: Weekly Audit

on:
  schedule:
    - cron: "15 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-and-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vulture pylint numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Generate A-G audit report
        run: |
          python conductor/guardrail_audit.py --markdown-out tasks/audit/latest_guardrail_report.md --json-out tasks/audit/latest_guardrail_report.json
      - name: Run lightweight profiling hooks
        run: |
          python conductor/profile_hotpaths.py --json-out tasks/audit/profile_hotpaths.json
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-audit
          path: |
            tasks/audit/latest_guardrail_report.md
            tasks/audit/latest_guardrail_report.json
            tasks/audit/profile_hotpaths.json

  ai-weekly-triage:
    runs-on: ubuntu-latest
    needs: [audit-and-profile]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download audit artifacts
        uses: actions/download-artifact@v4
        with:
          name: weekly-audit
          path: ai_artifacts/weekly
      - name: Build AI input bundle
        run: |
          python conductor/build_ai_bundle.py --kind weekly_audit --artifact-dir ai_artifacts/weekly --output ai_artifacts/weekly_bundle.json
      - name: Run AI weekly triage
        env:
          AI_TRIAGE_PROVIDER: ${{ vars.AI_TRIAGE_PROVIDER || 'openai' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-pro' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5-20250929' }}
        run: |
          python conductor/ai_triage.py --input ai_artifacts/weekly_bundle.json --output ai_artifacts/weekly_triage.json
      - name: Post GitHub feedback
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python conductor/github_feedback.py --bundle ai_artifacts/weekly_bundle.json --triage ai_artifacts/weekly_triage.json
      - name: Upload AI triage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ai-triage
          path: |
            ai_artifacts/weekly_bundle.json
            ai_artifacts/weekly_triage.json
