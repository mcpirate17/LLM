name: Governance CI

on:
  push:
    branches: [main, master]
    paths:
      - "GLOBAL_DEV_PROMPT.md"
      - "conductor/**"
      - "research/**"
      - "aria_core/**"
      - "aria_designer/**"
      - ".pre-commit-config.yaml"
      - ".secrets.baseline"
      - ".semgrep.yml"
      - "biome.json"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "pyrightconfig.json"
      - "uv.lock"
      - ".github/workflows/governance-ci.yml"
  pull_request:
    paths:
      - "GLOBAL_DEV_PROMPT.md"
      - "conductor/**"
      - "research/**"
      - "aria_core/**"
      - "aria_designer/**"
      - ".pre-commit-config.yaml"
      - ".secrets.baseline"
      - ".semgrep.yml"
      - "biome.json"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "pyrightconfig.json"
      - "uv.lock"
      - ".github/workflows/governance-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node tooling
        run: npm ci

      - name: Install pre-commit runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Run DRY/language guardrails
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m research.tools.dry_language_guardrails --strict

      - name: Run guardrail audit
        run: |
          mkdir -p tasks/audit
          python conductor/guardrail_audit.py \
            --check \
            --markdown-out tasks/audit/latest_guardrail_report.md \
            --json-out tasks/audit/latest_guardrail_report.json

      - name: Run pre-commit baseline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-audit
          path: |
            tasks/audit/latest_guardrail_report.md
            tasks/audit/latest_guardrail_report.json
          if-no-files-found: ignore
