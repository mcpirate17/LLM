name: Pipeline CI

on:
  push:
    branches: [main, master]
    paths:
      - "research/**"
      - "aria_designer/**"
      - "aria_core/**"
      - "Makefile"
      - ".github/workflows/pipeline-ci.yml"
  pull_request:
    paths:
      - "research/**"
      - "aria_designer/**"
      - "aria_core/**"
      - "Makefile"
      - ".github/workflows/pipeline-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: pipeline-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run static lint checks
        run: |
          ruff check research/scientist aria_designer/api aria_designer/runtime

  research-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install research test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask requests
          pip install torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run research observability contract test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest research/tests/test_api_integration.py -k experiment_failures --tb=short --junitxml=artifacts/research-junit.xml
      - name: Upload research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-contracts
          path: |
            artifacts/research-junit.xml
            research/monitor_alerts.json

  designer-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install designer test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r aria_designer/api/requirements.txt
          pip install -r aria_designer/requirements-test.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run designer observability contract tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest aria_designer/tests/test_api.py -k "structured_error_details or eval_run_store_persists_to_database" --tb=short --junitxml=artifacts/designer-junit.xml
      - name: Upload designer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: designer-contracts
          path: artifacts/designer-junit.xml

  integration-contracts:
    runs-on: ubuntu-latest
    needs: [research-contracts, designer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask requests
          pip install -r aria_designer/api/requirements.txt
          pip install -r aria_designer/requirements-test.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run integration make target
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          make test-integration
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-contracts
          path: |
            aria_designer/api/aria_designer.db

  ai-pipeline-triage:
    runs-on: ubuntu-latest
    needs: [research-contracts, designer-contracts, integration-contracts]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download pipeline artifacts
        uses: actions/download-artifact@v4
        with:
          path: ai_downloads
      - name: Assemble pipeline artifact bundle
        run: |
          mkdir -p ai_artifacts/pipeline
          cp -f ai_downloads/research-contracts/research-junit.xml ai_artifacts/pipeline/ 2>/dev/null || true
          cp -f ai_downloads/designer-contracts/designer-junit.xml ai_artifacts/pipeline/ 2>/dev/null || true
      - name: Build AI input bundle
        run: |
          python conductor/build_ai_bundle.py --kind pipeline --artifact-dir ai_artifacts/pipeline --output ai_artifacts/pipeline_bundle.json
      - name: Run AI pipeline triage
        env:
          AI_TRIAGE_PROVIDER: ${{ vars.AI_TRIAGE_PROVIDER || 'openai' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-pro' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5-20250929' }}
        run: |
          python conductor/ai_triage.py --input ai_artifacts/pipeline_bundle.json --output ai_artifacts/pipeline_triage.json
      - name: Post GitHub feedback
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python conductor/github_feedback.py --bundle ai_artifacts/pipeline_bundle.json --triage ai_artifacts/pipeline_triage.json
      - name: Upload AI triage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-ai-triage
          path: |
            ai_artifacts/pipeline_bundle.json
            ai_artifacts/pipeline_triage.json
