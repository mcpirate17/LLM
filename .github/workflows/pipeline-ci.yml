name: Pipeline CI

on:
  push:
    branches: [main, master]
    paths:
      - "research/**"
      - "aria_designer/**"
      - "aria_core/**"
      - "component_fab/**"
      - "Makefile"
      - "pyproject.toml"
      - ".github/workflows/pipeline-ci.yml"
  pull_request:
    paths:
      - "research/**"
      - "aria_designer/**"
      - "aria_core/**"
      - "component_fab/**"
      - "Makefile"
      - "pyproject.toml"
      - ".github/workflows/pipeline-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run static lint checks
        run: |
          ruff check research/scientist aria_designer/api aria_designer/runtime component_fab

  component-fab-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install component_fab test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[component-fab-test]" fastapi uvicorn numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run component_fab platform contracts
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest component_fab/tests/test_platform_contracts.py -q --tb=short --junitxml=artifacts/component-fab-junit.xml
      - name: Upload component_fab artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-fab-contracts
          path: artifacts/component-fab-junit.xml

  research-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install research test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest flask requests
          pip install torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run research observability contract test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest research/tests/test_api_integration.py -k experiment_failures --tb=short --junitxml=artifacts/research-junit.xml
      - name: Upload research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-contracts
          path: |
            artifacts/research-junit.xml
            research/monitor_alerts.json

  designer-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install designer test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r aria_designer/api/requirements.txt
          pip install -r aria_designer/requirements-test.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run designer observability contract tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest aria_designer/tests/test_api.py -k "structured_error_details or eval_run_store_persists_to_database" --tb=short --junitxml=artifacts/designer-junit.xml
      - name: Upload designer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: designer-contracts
          path: artifacts/designer-junit.xml

  integration-contracts:
    runs-on: ubuntu-latest
    needs: [research-contracts, designer-contracts, component-fab-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest flask requests
          pip install -r aria_designer/api/requirements.txt
          pip install -r aria_designer/requirements-test.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run integration make target
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          make test-integration
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-contracts
          path: |
            aria_designer/api/aria_designer.db
