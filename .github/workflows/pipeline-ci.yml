name: Pipeline CI

on:
  push:
    branches: [main, master]
    paths:
      - "research/**"
      - "aria_designer/**"
      - "aria_core/**"
      - "Makefile"
      - "pyproject.toml"
      - ".github/workflows/pipeline-ci.yml"
  pull_request:
    paths:
      - "research/**"
      - "aria_designer/**"
      - "aria_core/**"
      - "Makefile"
      - "pyproject.toml"
      - ".github/workflows/pipeline-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
      - name: Run static lint checks
        run: ruff check research/scientist aria_designer/api aria_designer/runtime

  research-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install research test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest flask requests
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run research observability contract test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest research/tests/test_api_integration.py -k experiment_failures --tb=short --junitxml=artifacts/research-junit.xml
      - name: Upload research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-contracts
          path: |
            artifacts/research-junit.xml
            research/monitor_alerts.json
          if-no-files-found: ignore

  designer-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install designer test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r aria_designer/api/requirements.txt
          python -m pip install -r aria_designer/requirements-test.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run designer observability contract tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p artifacts
          pytest aria_designer/tests/test_api.py -k "structured_error_details or eval_run_store_persists_to_database" --tb=short --junitxml=artifacts/designer-junit.xml
      - name: Upload designer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: designer-contracts
          path: artifacts/designer-junit.xml
          if-no-files-found: ignore

  integration-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [research-contracts, designer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest flask requests
          python -m pip install -r aria_designer/api/requirements.txt
          python -m pip install -r aria_designer/requirements-test.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/
      - name: Run integration make target
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: make test-integration
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-contracts
          path: aria_designer/api/aria_designer.db
          if-no-files-found: ignore
