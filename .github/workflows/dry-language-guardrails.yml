name: DRY Language Guardrails

on:
  push:
    branches: [main, master]
    paths:
      - 'aria_core/**'
      - 'aria_designer/**'
      - 'research/**'
      - 'Makefile'
      - '.github/workflows/dry-language-guardrails.yml'
  pull_request:
    paths:
      - 'aria_core/**'
      - 'aria_designer/**'
      - 'research/**'
      - 'Makefile'
      - '.github/workflows/dry-language-guardrails.yml'
  workflow_dispatch:

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run DRY/language guardrails (baseline-enforced)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m research.tools.dry_language_guardrails --strict

